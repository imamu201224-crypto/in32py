<!DOCTYPE html>
  <html lang="en">
    <head>
         <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WEB DEMO</title>
    <button>CREATE ACCOUNT</button> <a href="/">CREATE ACCOUNT</a>

          </head>
            </html>
            <h1>WEB DEMO</h1>
            <body bgcolor="red">
            </body>
   
         <div class="card">
    <div class="banner" id="banner"></div>

    <form method="POST" action="/submit-registration" id="regForm" novalidate>

      <!-- Personal Info -->
      <div class="section-label">Personal Information</div>

      <div class="field-row">
        <div class="field">
          <label for="fullname">Full Name <span class="req">*</span></label>
          <input type="text" id="fullname" name="fullname"
                 placeholder="e.g. Ahmad Abdulhamid"
                 required autocomplete="name"/>
        </div>
        <div class="field">
          <label for="email">Email Address <span class="req">*</span></label>
          <input type="email" id="email" name="email"
                 placeholder="@gmail.com"
                 required autocomplete="email"/>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="age">Age <span class="req">*</span></label>
          <input type="number" id="age" name="age"
                 placeholder="18–120" min="18" max="120" required/>
        </div>
        <div class="field">
          <label for="country">Country <span class="req">*</span></label>
          <select id="country" name="country" required>
            <option value="" disabled selected>Select your country</option>
            <option value="NG">Nigeria</option>
            <option value="GH">Ghana</option>
            <option value="KE">Kenya</option>
            <option value="ZA">South Africa</option>
            <option value="EG">Egypt</option>
            <option value="ET">Ethiopia</option>
            <option value="GB">United Kingdom</option>
            <option value="US">United States</option>
            <option value="CA">Canada</option>
            <option value="IN">India</option>
          </select>
        </div>
      </div>

      <!-- Gender -->
      <div class="section-label">Gender</div>
      <div class="field">
        <div class="radio-group">
          <label>
            <input type="radio" name="gender" value="male"/> Male
          </label>
          <label>
            <input type="radio" name="gender" value="female"/> Female
          </label>
          <label>
            <input type="radio" name="gender" value="prefer_not"/> Prefer not to say
          </label>
        </div>
      </div>

      <!-- Interests -->
      <div class="section-label">Interests</div>
      <div class="field">
        <div class="check-group">
          <label><input type="checkbox" name="interests[]" value="sports"/> Sports</label>
          <label><input type="checkbox" name="interests[]" value="music"/>  Music</label>
          <label><input type="checkbox" name="interests[]" value="technology"/> Technology</label>
          <label><input type="checkbox" name="interests[]" value="art"/>   Art</label>
        </div>
      </div>

      <!-- Bio -->
      <div class="section-label">About You</div>
      <div class="field">
        <label for="bio">Bio</label>
        <textarea id="bio" name="bio" maxlength="500"
                  placeholder="Tell us a little about yourself…"></textarea>
        <div class="char-counter" id="charCount">0 / 500</div>
      </div>

      <!-- Buttons -->
      <div class="btn-row">
        <button type="reset" class="btn btn-reset">Reset</button>
        <button type="submit" class="btn btn-submit">Create Account →</button> <h2>Learn more <a href="/">http://127.0.0.1:5500/index.html</a>
      </div>

    </form>
  </div>
</div>

<script>
  // Character counter for bio
  const bio = document.getElementById('bio');
  const counter = document.getElementById('charCount');
  bio.addEventListener('input', () => {
    const len = bio.value.length;
    counter.textContent = `${len} / 500`;
    counter.classList.toggle('warn', len > 450);
  });

  // Client-side validation before submit
  document.getElementById('regForm').addEventListener('submit', function(e) {
    const fields = this.querySelectorAll('[required]');
    let ok = true;
    fields.forEach(f => {
      if (!f.value.trim()) { f.focus(); ok = false; }
    });
    if (!ok) e.preventDefault();
  });

  // Show URL param feedback (e.g. after PHP redirect ?status=success)
  const params = new URLSearchParams(location.search);
  if (params.get('status') === 'success') {
    const b = document.getElementById('banner');
    b.textContent = '✓ Registration successful! Welcome aboard.';
    b.style.display = 'block';
  }
</script>

</body>
</html>
