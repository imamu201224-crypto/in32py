<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Registration</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0f1a;
      --surface: #111827;
      --border: #1e2d40;
      --accent: #00d4aa;
      --accent2: #0ea5e9;
      --text: #e8edf5;
      --muted: #6b7a99;
      --error: #f87171;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Atmospheric background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(0,212,170,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 80%, rgba(14,165,233,0.07) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.6s ease both;
    }

    .header .badge {
      display: inline-block;
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(0,212,170,0.3);
      background: rgba(0,212,170,0.05);
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }

    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 800;
      line-height: 1.1;
      background: linear-gradient(135deg, #e8edf5 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    /* Section labels */
    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
      margin-top: 2rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .section-label:first-of-type { margin-top: 0; }

    /* Field groups */
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 520px) {
      .field-row { grid-template-columns: 1fr; }
      .card { padding: 1.5rem; }
    }

    .field { display: flex; flex-direction: column; gap: 0.45rem; margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }

    label {
      font-size: 0.82rem;
      font-weight: 500;
      color: #a0aec0;
      letter-spacing: 0.01em;
    }
    label span.req { color: var(--accent); margin-left: 2px; }

    input[type="text"],
    input[type="email"],
    input[type="number"],
    select,
    textarea {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      font-weight: 300;
      padding: 0.7rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      width: 100%;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      background: rgba(0,212,170,0.04);
      box-shadow: 0 0 0 3px rgba(0,212,170,0.12);
    }

    select option { background: #1a2233; color: var(--text); }

    textarea {
      resize: vertical;
      min-height: 110px;
    }

    /* Character counter */
    .char-counter {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: right;
      margin-top: 0.25rem;
      transition: color 0.2s;
    }
    .char-counter.warn { color: var(--error); }

    /* Radio & Checkbox groups */
    .radio-group, .check-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-top: 0.2rem;
    }

    .radio-group label, .check-group label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      padding: 0.45rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--muted);
      transition: all 0.2s;
      user-select: none;
    }

    .radio-group input[type="radio"],
    .check-group input[type="checkbox"] {
      width: 0; height: 0; opacity: 0; position: absolute;
    }

    .radio-group label:has(input:checked),
    .check-group label:has(input:checked) {
      border-color: var(--accent);
      background: rgba(0,212,170,0.1);
      color: var(--accent);
    }

    .radio-group label:hover,
    .check-group label:hover {
      border-color: rgba(0,212,170,0.4);
      color: var(--text);
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 2rem;
    }

    .btn {
      flex: 1;
      padding: 0.85rem 1.5rem;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-reset {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-reset:hover {
      border-color: var(--muted);
      color: var(--text);
      background: rgba(255,255,255,0.04);
    }

    .btn-submit {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0b0f1a;
      box-shadow: 0 4px 20px rgba(0,212,170,0.25);
    }
    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(0,212,170,0.35);
    }
    .btn-submit:active { transform: translateY(0); }

    /* Validation hints */
    .field-hint {
      font-size: 0.72rem;
      color: var(--muted);
    }

    input:invalid:not(:placeholder-shown) {
      border-color: rgba(248,113,113,0.5);
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Success banner (shown by PHP redirect or JS) */
    .banner {
      display: none;
      background: rgba(0,212,170,0.1);
      border: 1px solid rgba(0,212,170,0.3);
      border-radius: var(--radius);
      color: var(--accent);
      font-size: 0.88rem;
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="badge">New Account</div>
    <h1>Create Your Profile</h1>
    <p>Join the community — it only takes a minute.</p>
  </div>

  <div class="card">
    <div class="banner" id="banner"></div>

    <form method="POST" action="/submit-registration" id="regForm" novalidate>

      <!-- Personal Info -->
      <div class="section-label">Personal Information</div>

      <div class="field-row">
        <div class="field">
          <label for="fullname">Full Name <span class="req">*</span></label>
          <input type="text" id="fullname" name="fullname"
                 placeholder="e.g. Ahmad Abdulhamid"
                 required autocomplete="name"/>
        </div>
        <div class="field">
          <label for="email">Email Address <span class="req">*</span></label>
          <input type="email" id="email" name="email"
                 placeholder="@gmail.com"
                 required autocomplete="email"/>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="age">Age <span class="req">*</span></label>
          <input type="number" id="age" name="age"
                 placeholder="18–120" min="18" max="120" required/>
        </div>
        <div class="field">
          <label for="country">Country <span class="req">*</span></label>
          <select id="country" name="country" required>
            <option value="" disabled selected>Select your country</option>
            <option value="NG">Nigeria</option>
            <option value="GH">Ghana</option>
            <option value="KE">Kenya</option>
            <option value="ZA">South Africa</option>
            <option value="EG">Egypt</option>
            <option value="ET">Ethiopia</option>
            <option value="GB">United Kingdom</option>
            <option value="US">United States</option>
            <option value="CA">Canada</option>
            <option value="IN">India</option>
          </select>
        </div>
      </div>

      <!-- Gender -->
      <div class="section-label">Gender</div>
      <div class="field">
        <div class="radio-group">
          <label>
            <input type="radio" name="gender" value="male"/> Male
          </label>
          <label>
            <input type="radio" name="gender" value="female"/> Female
          </label>
          <label>
            <input type="radio" name="gender" value="prefer_not"/> Prefer not to say
          </label>
        </div>
      </div>

      <!-- Interests -->
      <div class="section-label">Interests</div>
      <div class="field">
        <div class="check-group">
          <label><input type="checkbox" name="interests[]" value="sports"/> Sports</label>
          <label><input type="checkbox" name="interests[]" value="music"/>  Music</label>
          <label><input type="checkbox" name="interests[]" value="technology"/> Technology</label>
          <label><input type="checkbox" name="interests[]" value="art"/>   Art</label>
        </div>
      </div>

      <!-- Bio -->
      <div class="section-label">About You</div>
      <div class="field">
        <label for="bio">Bio</label>
        <textarea id="bio" name="bio" maxlength="500"
                  placeholder="Tell us a little about yourself…"></textarea>
        <div class="char-counter" id="charCount">0 / 500</div>
      </div>

      <!-- Buttons -->
      <div class="btn-row">
        <button type="reset" class="btn btn-reset">Reset</button>
        <button type="submit" class="btn btn-submit">Create Account →</button>
      </div>

    </form>
  </div>
</div>

<script>
  // Character counter for bio
  const bio = document.getElementById('bio');
  const counter = document.getElementById('charCount');
  bio.addEventListener('input', () => {
    const len = bio.value.length;
    counter.textContent = `${len} / 500`;
    counter.classList.toggle('warn', len > 450);
  });

  // Client-side validation before submit
  document.getElementById('regForm').addEventListener('submit', function(e) {
    const fields = this.querySelectorAll('[required]');
    let ok = true;
    fields.forEach(f => {
      if (!f.value.trim()) { f.focus(); ok = false; }
    });
    if (!ok) e.preventDefault();
  });

  // Show URL param feedback (e.g. after PHP redirect ?status=success)
  const params = new URLSearchParams(location.search);
  if (params.get('status') === 'success') {
    const b = document.getElementById('banner');
    b.textContent = '✓ Registration successful! Welcome aboard.';
    b.style.display = 'block';
  }
</script>

</body>
</html>
